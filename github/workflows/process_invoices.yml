name: Process invoices

on:
  push:
    paths:
      - 'inbox/**.pdf'
      - 'inbox/**/*.pdf'
      - '.github/workflows/process_invoices.yml'
      - 'src/**'
      - 'templates/**'
      - 'requirements.txt'
      - 'process_invoices.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-spa \
            tesseract-ocr-eng \
            ghostscript \
            qpdf \
            pngquant \
            unpaper

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: '1'

      - name: Process inbox
        run: python process_invoices.py --repo-root .

      - name: Commit results
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inbox processed failed output
          git commit -m "chore: process invoices"
          git push
